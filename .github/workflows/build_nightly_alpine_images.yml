name: Build Nightly Alpine Images

on:
  schedule:
    - cron: '47 13 * * *'
  workflow_dispatch:

jobs:
  build_nightly_images:
    runs-on: ubuntu-24.04-arm
    if: github.repository == 'swoole/docker-swoole'
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]

    steps:
      -
        name: Checkout
        uses: actions/checkout@v7

      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      -
        name: Build Docker image phpswoole/swoole:php${{ matrix.php }}-alpine for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/nightly/php${{ matrix.php }}/alpine/Dockerfile
          load: true
          push: false
          tags: phpswoole/swoole:test

      -
        name: Test Docker image phpswoole/swoole:php${{ matrix.php }}-alpine
        run: ./bin/test-image.sh phpswoole/swoole:test

      -
        name: Build and push Docker image phpswoole/swoole:php${{ matrix.php }}-alpine
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/nightly/php${{ matrix.php }}/alpine/Dockerfile
          platforms: linux/amd64,linux/arm64/v8,linux/ppc64le,linux/s390x
          push: true
          tags: phpswoole/swoole:php${{ matrix.php }}-alpine
